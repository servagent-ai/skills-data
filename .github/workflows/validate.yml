name: Validate & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate skills.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JSON is valid
        run: python3 -c "import json; data=json.load(open('data/skills.json')); print(f'✓ {len(data)} skills, valid JSON')"

      - name: Check required fields
        run: |
          python3 - <<'EOF'
          import json, sys
          data = json.load(open('data/skills.json'))
          required = ['id', 'name', 'description', 'category']
          errors = []
          for i, skill in enumerate(data):
              for f in required:
                  if not skill.get(f):
                      errors.append(f"[{i}] missing field: {f}")
          if errors:
              for e in errors[:20]:
                  print(e)
              sys.exit(1)
          print(f'✓ All {len(data)} skills have required fields')
          EOF

      - name: Print stats
        run: |
          python3 - <<'EOF'
          import json
          from collections import Counter
          data = json.load(open('data/skills.json'))
          cats = Counter(s.get('category','unknown') for s in data)
          print(f"Total: {len(data)} skills")
          print("Top categories:")
          for cat, count in cats.most_common(10):
              print(f"  {cat}: {count}")
          EOF

  deploy:
    name: Upload to production
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Upload skills via SSH tunnel
        run: |
          # Open SSH tunnel: local 18787 → server localhost:8787
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            -L 18787:localhost:8787 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            -fN -o ExitOnForwardFailure=yes
          sleep 2
          # Call API locally through tunnel
          RESULT=$(curl -sf -X POST http://localhost:18787/api/v1/admin/tools/import \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer ${{ secrets.SERVAGENT_API_KEY }}' \
            -d @data/skills.json)
          echo "$RESULT"
          echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          data = d['data']
          print(f'✓ added={data[\"added\"]} updated={data[\"updated\"]} skipped={data[\"skipped\"]} total={data[\"total\"]}')
          "

      - name: Verify
        run: |
          sleep 3
          curl -sf https://servagent.ai/api/v1/health \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='healthy'; print('✓ Production healthy')"
